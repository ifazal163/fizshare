<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FizShare - 3D Secure File Transfer</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  /* Base Theme - Soft Warm Claymorphism */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body {
    background-color: #f3ece4; color: #4a4a4a; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; position: relative; overflow-x: hidden;
  }

  /* --- Perfected Bottom-to-Top Particles --- */
  .particles-container { 
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
    z-index: -1; pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute; display: flex; align-items: center; justify-content: center;
    opacity: 0.35; /* Exact 35% Transparency */
    text-shadow: 1px 2px 3px rgba(0,0,0,0.05);
  }
  .clay-pebble {
    width: 6px; height: 6px; background: #b08d75; border-radius: 50%;
    box-shadow: inset 1px 1px 2px rgba(255,255,255,0.4), 1px 1px 2px rgba(0,0,0,0.05);
  }
  .p-dark { color: #2b5c7a; } .p-warm { color: #d67a50; }

  /* Smooth Float Animation */
  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-20vh) rotate(360deg); }
  }

  /* --- Overlapping 3D Puffy Bubble Logo --- */
  .logo-wrapper { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; z-index: 10; }
  .logo-bubbles { display: flex; align-items: center; position: relative; height: 90px; }
  
  .puffy-bubble {
    display: flex; align-items: center; gap: 8px; padding: 15px 25px;
    border-radius: 30px; font-weight: 800; font-size: 1.6rem;
    box-shadow: 8px 8px 16px #d1c8c0, -8px -8px 16px #ffffff, inset 3px 3px 8px rgba(255,255,255,0.8);
  }
  .arrow-icon { font-size: 1.8rem; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1)); position: relative;}
  
  .fiz-bubble { background-color: #d1b015; color: #2b7bc4; border: 2px solid #f7d83b; z-index: 1; transform: rotate(-3deg); }
  .share-bubble { background-color: #3895e0; color: #f7d83b; border: 2px solid #bae6fd; z-index: 2; margin-left: -15px; margin-bottom: 15px; transform: rotate(2deg); }
  
  .tagline {
    font-size: 1rem; color: #8c7e71; margin-top: 15px; font-weight: 600;
    background: rgba(255,255,255,0.6); padding: 8px 25px; border-radius: 20px;
    box-shadow: inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(0,0,0,0.03);
  }

  /* --- Main Transfer Card --- */
  .card {
    background: #f3ece4; border-radius: 40px; padding: 40px; 
    width: 100%; max-width: 480px; 
    transition: max-width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    box-shadow: 20px 20px 40px #d4cec6, -20px -20px 40px #ffffff, inset 4px 4px 10px rgba(255, 255, 255, 0.6);
    border: 2px solid rgba(255,255,255,0.4); z-index: 10;
  }
  .card.expanded { max-width: 900px; } 

  /* Google Profile & Tabs */
  #google-wrapper { display: flex; justify-content: center; width: 100%; margin-bottom: 25px; }
  .user-profile { 
    background: #e0f2fe; color: #0284c7; padding: 12px 20px; border-radius: 20px; 
    text-align: center; font-weight: 700; margin-bottom: 25px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05); 
  }
  .tabs { display: flex; gap: 15px; margin-bottom: 25px; }
  .tab {
    flex: 1; padding: 14px; border: none; border-radius: 20px; cursor: pointer; font-size: 1rem; font-weight: 700;
    background: #f3ece4; color: #8c7e71; box-shadow: 5px 5px 10px #d4cec6, -5px -5px 10px #ffffff; transition: all 0.3s;
  }
  .tab.active { background: #3b82f6; color: #fff; box-shadow: inset 4px 4px 8px rgba(0,0,0,0.15); }
  .section { display: none; } .section.active { display: block; animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Drop Zone Pill Button */
  .drop-btn {
    width: 100%; padding: 18px; background: #f3ece4; color: #3b82f6; border: none;
    border-radius: 25px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px;
    box-shadow: 6px 6px 12px #d4cec6, -6px -6px 12px #ffffff, inset 2px 2px 5px rgba(255,255,255,0.6); 
  }
  .drop-btn:hover, .card.dragover .drop-btn { 
    background: #3b82f6; color: #fff; 
    box-shadow: inset 4px 4px 8px rgba(0,0,0,0.15), inset -4px -4px 8px rgba(255,255,255,0.2), 6px 6px 12px rgba(0,0,0,0.05); 
  }

  /* YouTube Style Grid Layout */
  #file-items-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .yt-file-card {
    background: #ffffff; border-radius: 18px; padding: 10px; display: flex; flex-direction: column; align-items: center;
    box-shadow: 5px 5px 12px #d4cec6, -5px -5px 12px #ffffff; position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .yt-thumbnail {
    width: 100%; aspect-ratio: 4/3; border-radius: 12px; object-fit: cover; background: #f3ece4; 
    display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 10px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
  }
  .yt-title { font-size: 0.85rem; font-weight: 700; color: #4a4a4a; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .yt-remove {
    position: absolute; top: -8px; right: -8px; width: 26px; height: 26px; border-radius: 50%;
    background: #fee2e2; border: 2px solid #fff; color: #ef4444; font-weight: 900; font-size: 0.8rem;
    cursor: pointer; box-shadow: 2px 2px 5px rgba(239, 68, 68, 0.3); display: flex; align-items: center; justify-content: center;
  }

  /* Buttons & Inputs */
  .btn-primary {
    width: 100%; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 20px;
    font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 6px 6px 12px #d4cec6, -6px -6px 12px #ffffff;
  }
  .btn-primary:active { box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); transform: scale(0.98); }
  .btn-clear { background: #fdfcfa; color: #ef4444; border: 2px solid #fee2e2; margin-top: 15px; display: none; }
  .btn-success { background: #10b981; color: #fff; pointer-events: none; border: 2px solid #fff; box-shadow: inset 3px 3px 6px rgba(255,255,255,0.4), 6px 6px 12px #d4cec6; font-size: 1rem; padding: 16px; width: 100%;} 

  input[type="text"] {
    width: 100%; padding: 18px; background: #fdfcfa; border: none; border-radius: 20px; color: #4a4a4a;
    font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; text-align: center; letter-spacing: 6px; outline: none;
    box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05), inset -4px -4px 8px #ffffff;
  }
  
  .status { text-align: center; padding: 15px; border-radius: 15px; margin-top: 20px; font-size: 1rem; font-weight: 700; display: none; }
  .status.info { display: block; background: #e0f2fe; color: #0284c7; }
  .status.success { display: block; background: #d1fae5; color: #059669; }
  .status.error { display: block; background: #fee2e2; color: #e11d48; }
  
  .code-box { background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 25px; display: none; box-shadow: inset 3px 3px 8px rgba(0,0,0,0.03); }
  .code-label { color: #8c7e71; font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
  #send-room-code { font-size: 3.5rem; font-weight: 900; color: #3b82f6; letter-spacing: 10px; text-shadow: 2px 2px 4px rgba(59,130,246,0.2);}

  .progress-bar { width: 100%; height: 12px; background: #eae1d8; border-radius: 6px; margin-top: 20px; overflow: hidden; display: none; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #06b6d4); width: 0%; border-radius: 6px; transition: width 0.2s; }
</style>
</head>
<body>

<div class="particles-container" id="background-particles"></div>

<div class="logo-wrapper">
  <div class="logo-bubbles">
    <div class="puffy-bubble fiz-bubble"><span class="arrow-icon">↑</span> Fiz</div>
    <div class="puffy-bubble share-bubble"><span class="arrow-icon">↓</span> Share</div>
  </div>
  <p class="tagline">We don't save. We just share.</p>
</div>

<div class="card" id="main-card">
  
  <div id="google-wrapper">
    <div id="g_id_onload"
         data-client_id="744434368141-l6om00l5239oegdair8n6j9i9fqj869a.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-shape="pill"
         data-theme="outline"
         data-text="continue_with"
         data-size="large"
         data-logo_alignment="left"
         data-width="400">
    </div>
  </div>
  <div id="user-profile" class="user-profile" style="display:none;"></div>

  <div class="tabs" id="tabs-menu">
    <button class="tab active" onclick="switchTab('send')">📤 Send Data</button>
    <button class="tab" onclick="switchTab('receive')">📥 Receive Data</button>
  </div>

  <div class="section active" id="send-section">
    <div class="drop-btn" onclick="document.getElementById('file-input').click()">
      <span style="font-size: 1.5rem;">📁</span> Click or Drop Files Here
    </div>
    <input type="file" id="file-input" multiple style="display:none">
    
    <div id="file-items-container"></div>

    <button class="btn-primary" id="generate-code-btn" onclick="generateTransferCode()">Generate Transfer Code</button>
    
    <div class="code-box" id="send-code-box">
      <div class="code-label">Receiver ko yeh 5-Digit code dein:</div>
      <div id="send-room-code"></div>
    </div>

    <button class="btn-primary btn-clear" id="clear-all-btn" onclick="clearAll()">🔄 Clear All & Send More</button>

    <div class="status" id="send-status"></div>
    <div class="progress-bar" id="send-progress"><div class="progress-fill" id="send-fill"></div></div>
  </div>

  <div class="section" id="receive-section">
    <input type="text" id="room-input" placeholder="5-Digit Code" maxlength="5">
    <button class="btn-primary" id="receive-btn" onclick="joinRoom()">📥 Connect & Receive</button>
    <div class="status" id="recv-status"></div>
    <div class="progress-bar" id="recv-progress"><div class="progress-fill" id="recv-fill"></div></div>
  </div>
</div>

<script>
// =========================================================================
// --- Upward Floating Background Logic (No Overlap) ---
// =========================================================================
const particlesContainer = document.getElementById('background-particles');
const iconsPool = ['📄', '🖼️', '🗂️', '🗃️', '💾', '🎵', '🎥', '✨', '🖃', '🗐', '📋', '🎼', '🎦', '🎞️', '🎬', '📷'];

// Screen ko vertical columns (lanes) mein divide kiya hai taake horizontal overlap na ho
const laneWidth = 70; 
const numLanes = Math.floor(window.innerWidth / laneWidth);
const totalParticles = numLanes * 2; // Har lane mein average 2 icons honge

for (let i = 0; i < totalParticles; i++) {
    const particle = document.createElement('span');
    const isPebble = iconsPool[Math.floor(Math.random() * iconsPool.length)] === 'Fiz';
    
    particle.className = 'particle';
    if (isPebble) { 
        particle.innerHTML = '<div class="clay-pebble"></div>'; 
    } else {
        particle.textContent = iconsPool[Math.floor(Math.random() * iconsPool.length)];
        particle.style.fontSize = (0.8 + Math.random() * 0.4) + 'rem'; // Small size
        particle.classList.add(i % 2 === 0 ? 'p-dark' : 'p-warm');
    }

    // Lane system: Har icon ki apni ek left-right jagah hogi, takrayenge nahi
    let lane = i % numLanes;
    let xPos = (lane * laneWidth) + (Math.random() * 20);
    particle.style.left = xPos + 'px';

    // Animation Time aur Start Time (Delay) alag alag taake aik line mein move na karein
    let duration = 18 + Math.random() * 25; // 18 se 43 second ka slow safar
    let delay = -(Math.random() * 45); // Screen par already phelay hue honge
    
    particle.style.animation = `floatUp ${duration}s linear ${delay}s infinite`;
    particlesContainer.appendChild(particle);
}

// =========================================================================
// --- Google Auth Logic ---
// =========================================================================
let loggedInEmail = null;

function decodeJwtResponse(token) {
    let base64Url = token.split('.')[1];
    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
}

function handleGoogleLogin(response) {
    const payload = decodeJwtResponse(response.credential);
    loggedInEmail = payload.email;
    document.getElementById('google-wrapper').style.display = 'none';
    const profileDiv = document.getElementById('user-profile');
    profileDiv.style.display = 'block'; profileDiv.innerHTML = `👤 Linked to: <b>${loggedInEmail}</b>`;
    socket.emit('google-login', loggedInEmail);
    setStatus('send-status', 'info', '✅ Logged in! Drop files to auto-send to your other devices.');
    setStatus('recv-status', 'info', '✅ Logged in! Auto-receiving from your other devices.');
}

// =========================================================================
// --- Transfer Logic ---
// =========================================================================
const socket = io();
let selectedFilesList = []; let currentRoomCode = null; let peerConnection = null; let dataChannel = null; let sendingIndex = 0; 
let dataChannels = {};
const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab + '-section').classList.add('active');
  event.target.classList.add('active');
  setStatus('send-status', 'none'); setStatus('recv-status', 'none');
  const recvBtn = document.getElementById('receive-btn');
  recvBtn.innerHTML = '📥 Connect & Receive'; recvBtn.className = 'btn-primary';
}

const mainCard = document.getElementById('main-card');
document.getElementById('file-input').addEventListener('change', e => handleMultiFiles(e.target.files));
mainCard.addEventListener('dragover', e => { e.preventDefault(); mainCard.classList.add('dragover'); });
mainCard.addEventListener('dragleave', () => mainCard.classList.remove('dragover'));
mainCard.addEventListener('drop', e => { e.preventDefault(); mainCard.classList.remove('dragover'); handleMultiFiles(e.dataTransfer.files); });

function handleMultiFiles(files) {
    if(!files || files.length === 0) return;
    for (let i = 0; i < files.length; i++) selectedFilesList.push(files[i]);
    updateFileListUI();
}

function updateFileListUI() {
    const container = document.getElementById('file-items-container');
    container.innerHTML = ''; 
    if(selectedFilesList.length > 0) {
        mainCard.classList.add('expanded');
        const connectedChannels = Object.values(dataChannels || {}).filter(ch => ch.readyState === 'open');
        if(connectedChannels.length > 0) {
            document.getElementById('generate-code-btn').style.display = 'none';
            document.getElementById('send-code-box').style.display = 'none';
            if(document.getElementById('send-progress').style.display !== 'block') { sendFileChunks(selectedFilesList[sendingIndex]); }
        } else { document.getElementById('generate-code-btn').style.display = 'block'; }
    } else {
        mainCard.classList.remove('expanded');
        document.getElementById('generate-code-btn').style.display = 'block';
        document.getElementById('send-code-box').style.display = 'none';
        setStatus('send-status', 'none');
    }
    
    selectedFilesList.forEach((file, index) => {
        const fileItem = document.createElement('div'); fileItem.className = 'yt-file-card';
        let previewHtml = '';
        if (file.type.startsWith('image/')) {
            const imgUrl = URL.createObjectURL(file); previewHtml = `<img src="${imgUrl}" class="yt-thumbnail">`;
        } else {
            let icon = '📄'; if (file.type.startsWith('audio/')) icon = '🎵'; if (file.type.startsWith('video/')) icon = '🎥';
            previewHtml = `<div class="yt-thumbnail">${icon}</div>`;
        }
        fileItem.innerHTML = `<button class="yt-remove" onclick="removeFileFromList(${index})">✕</button>${previewHtml}<div class="yt-title" title="${file.name}">${file.name}</div>`;
        container.appendChild(fileItem);
    });
}

function removeFileFromList(index) { selectedFilesList.splice(index, 1); updateFileListUI(); }
function clearAll() {
    selectedFilesList = []; sendingIndex = 0; updateFileListUI();
    document.getElementById('clear-all-btn').style.display = 'none'; document.getElementById('send-progress').style.display = 'none';
    setStatus('send-status', 'none');
}

function generateTransferCode() {
  if (selectedFilesList.length === 0) { setStatus('send-status', 'error', '⚠️ Pehle file select karein!'); return; }
  let roomCode = Math.floor(10000 + Math.random() * 90000).toString();
  socket.emit('create-room', roomCode);
  document.getElementById('send-room-code').textContent = roomCode;
  document.getElementById('send-code-box').style.display = 'block';
  document.getElementById('generate-code-btn').style.display = 'none'; 
  setStatus('send-status', 'info', '⏳ Receiver ka connect hone ka wait karein...');
}

async function joinRoom() {
  const code = document.getElementById('room-input').value.trim();
  if (!code) return;
  socket.emit('join-room', code); setStatus('recv-status', 'info', '🔗 Linking devices...');
}

socket.on('peer-joined', async (peerId) => {
  setStatus('send-status', 'info', '🤝 Device connected! Transferring starting automatically...');
  peerConnection = new RTCPeerConnection(iceConfig);
  dataChannel = peerConnection.createDataChannel('fileTransfer');
  dataChannels[peerId] = dataChannel;
  setupSenderChannel(dataChannel);
  
  peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('signal', { to: peerId, signal: { candidate: e.candidate } }); };
  const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
  socket.emit('signal', { to: peerId, signal: { offer } });
});

socket.on('signal', async (data) => {
  if (data.signal.offer) {
    peerConnection = new RTCPeerConnection(iceConfig);
    peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('signal', { to: data.from, signal: { candidate: e.candidate } }); };
    peerConnection.ondatachannel = e => { dataChannel = e.channel; setupReceiverChannel(dataChannel); };
    await peerConnection.setRemoteDescription(data.signal.offer);
    const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
    socket.emit('signal', { to: data.from, signal: { answer } });
  } else if (data.signal.answer) { await peerConnection.setRemoteDescription(data.signal.answer);
  } else if (data.signal.candidate) { await peerConnection.addIceCandidate(data.signal.candidate); }
});

function setupSenderChannel(channel) {
  channel.onopen = () => {
      document.getElementById('send-code-box').style.display = 'none';
      if(selectedFilesList.length > 0) { sendingIndex = 0; sendFileChunks(selectedFilesList[sendingIndex]); } 
      else { setStatus('send-status', 'success', '🤝 Linked via Google! Drop files to send instantly.'); }
  };
  channel.onmessage = e => {
      if(e.data === 'NEXT_FILE') {
          sendingIndex++;
          if(sendingIndex < selectedFilesList.length) { sendFileChunks(selectedFilesList[sendingIndex]); } 
          else {
              channel.send('ALL_DONE'); 
              setStatus('send-status', 'success', '✅ All files transferred successfully!');
              document.getElementById('send-progress').style.display = 'none'; document.getElementById('clear-all-btn').style.display = 'block';
          }
      }
  };
}

function sendFileChunks(file) {
  setStatus('send-status', 'info', `📤 Sending: ${file.name} (${sendingIndex + 1}/${selectedFilesList.length})`);
  const meta = JSON.stringify({ name: file.name, size: file.size, type: file.type }); dataChannel.send('META:' + meta); 
  let offset = 0; const chunkSize = 16384; const reader = new FileReader();
  reader.onload = e => {
    dataChannel.send(e.target.result); offset += e.target.result.byteLength;
    const pct = Math.round((offset / file.size) * 100);
    document.getElementById('send-progress').style.display = 'block'; document.getElementById('send-fill').style.width = pct + '%';
    if (offset < file.size) { readSlice(offset); } else { dataChannel.send('END_FILE'); } 
  };
  const readSlice = o => { const slice = file.slice(o, o + chunkSize); reader.readAsArrayBuffer(slice); }; readSlice(0);
}

let receivedBuffers = []; let receivedSize = 0; let fileMetadata = null;
function setupReceiverChannel(channel) {
  channel.onmessage = e => {
    if (typeof e.data === 'string' && e.data.startsWith('META:')) {
      fileMetadata = JSON.parse(e.data.slice(5)); receivedBuffers = []; receivedSize = 0;
      setStatus('recv-status', 'info', `📥 Downloading: ${fileMetadata.name}`);
      document.getElementById('recv-progress').style.display = 'block';
    } else if (typeof e.data === 'string' && e.data === 'END_FILE') {
      const blob = new Blob(receivedBuffers, { type: fileMetadata.type });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fileMetadata.name; a.click();
      channel.send('NEXT_FILE'); setStatus('recv-status', 'success', '✅ Saved! Waiting for next...');
    } else if (typeof e.data === 'string' && e.data === 'ALL_DONE') {
      const recvBtn = document.getElementById('receive-btn');
      recvBtn.innerHTML = '🎉 Congrats! You received your files'; recvBtn.className = 'btn-success'; recvBtn.removeAttribute('onclick'); 
      document.getElementById('recv-progress').style.display = 'none'; setStatus('recv-status', 'none');
    } else {
      receivedBuffers.push(e.data); receivedSize += e.data.byteLength;
      const pct = Math.round((receivedSize / fileMetadata.size) * 100);
      document.getElementById('recv-progress').style.display = 'block'; document.getElementById('recv-fill').style.width = pct + '%';
    }
  };
}
socket.on('room-not-found', () => setStatus('recv-status', 'error', '❌ Invalid code!'));
function setStatus(id, type, msg) { const el = document.getElementById(id); if(type === 'none') { el.style.display = 'none'; return; } el.className = 'status ' + type; el.textContent = msg; }
</script>
</body>
</html>
