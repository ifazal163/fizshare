<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FizShare - 3D Secure File Transfer</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3b82f6">
<script src="/socket.io/socket.io.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  /* Base Theme - Soft Warm Claymorphism */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body {
    background-color: #f3ece4; color: #4a4a4a; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; position: relative; overflow-x: hidden;
  }

  /* --- Floating Particles --- */
  .particles-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; overflow: hidden; }
  .particle { position: absolute; display: flex; align-items: center; justify-content: center; opacity: 0.35; }
  .clay-pebble { width: 6px; height: 6px; background: #b08d75; border-radius: 50%; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.4), 1px 1px 2px rgba(0,0,0,0.05); }
  @keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-20vh) rotate(360deg); } }

  /* --- Logo --- */
  .logo-wrapper { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; z-index: 10; }
  .logo-bubbles { display: flex; align-items: center; position: relative; height: 90px; }
  .puffy-bubble { display: flex; align-items: center; gap: 8px; padding: 15px 25px; border-radius: 30px; font-weight: 800; font-size: 1.6rem; box-shadow: 8px 8px 16px #d1c8c0, -8px -8px 16px #ffffff, inset 3px 3px 8px rgba(255,255,255,0.8); }
  .fiz-bubble { background-color: #d1b015; color: #2b7bc4; border: 2px solid #f7d83b; z-index: 1; transform: rotate(-3deg); }
  .share-bubble { background-color: #3895e0; color: #f7d83b; border: 2px solid #bae6fd; z-index: 2; margin-left: -15px; margin-bottom: 15px; transform: rotate(2deg); }
  
  .tagline, .clay-pill {
    font-size: 1rem; color: #8c7e71; margin-top: 15px; font-weight: 600; text-align: center;
    background: rgba(255,255,255,0.6); padding: 12px 25px; border-radius: 25px;
    box-shadow: inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(0,0,0,0.03);
    display: flex; justify-content: center; align-items: center; width: 100%;
  }

  /* --- Main Transfer Card --- */
  .card {
    background: #f3ece4; border-radius: 40px; padding: 30px; width: 100%; max-width: 480px; 
    transition: all 0.5s ease; box-shadow: 20px 20px 40px #d4cec6, -20px -20px 40px #ffffff, inset 4px 4px 10px rgba(255, 255, 255, 0.6);
    border: 2px solid rgba(255,255,255,0.4); z-index: 10;
  }

  /* --- Google Button UI --- */
  #google-btn-container { margin-bottom: 25px; }
  #google-wrapper { min-height: 44px; display: flex; justify-content: center; }

  /* --- Install App Button --- */
  #install-banner { display: none; background: #10b981; color: white; border: none; padding: 12px; border-radius: 20px; font-weight: bold; width: 100%; margin-bottom: 20px; cursor: pointer; box-shadow: 4px 4px 10px rgba(16, 185, 129, 0.2); }

  /* --- Tabs & Sections --- */
  .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
  .tab { flex: 1; padding: 14px; border: none; border-radius: 20px; cursor: pointer; font-weight: 700; background: #f3ece4; color: #8c7e71; box-shadow: 5px 5px 10px #d4cec6, -5px -5px 10px #ffffff; }
  .tab.active { background: #3b82f6; color: #fff; box-shadow: inset 4px 4px 8px rgba(0,0,0,0.15); }
  .section { display: none; } .section.active { display: block; }

  .drop-btn { width: 100%; padding: 18px; background: #f3ece4; color: #3b82f6; border: none; border-radius: 25px; font-weight: 700; cursor: pointer; margin-bottom: 25px; box-shadow: 6px 6px 12px #d4cec6, -6px -6px 12px #ffffff, inset 2px 2px 5px rgba(255,255,255,0.6); }
  .btn-primary { width: 100%; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; box-shadow: 6px 6px 12px #d4cec6, -6px -6px 12px #ffffff; }
  .status { text-align: center; padding: 15px; border-radius: 15px; margin-top: 20px; font-weight: 700; display: none; }
  .status.info { display: block; background: #e0f2fe; color: #0284c7; }
</style>
</head>
<body>

<div class="particles-container" id="background-particles"></div>

<div class="logo-wrapper">
  <div class="logo-bubbles">
    <div class="puffy-bubble fiz-bubble">↑ Fiz</div>
    <div class="puffy-bubble share-bubble">↓ Share</div>
  </div>
  <p class="tagline">We don't save. We just share.</p>
</div>

<div class="card" id="main-card">
  <button id="install-banner">📲 Install FizShare for faster access!</button>

  <div id="google-btn-container" class="clay-pill">
    <div id="google-wrapper">
        <div id="g_id_onload"
             data-client_id="744434368141-l6om00l5239oegdair8n6j9i9fqj869a.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="continue_with" data-size="large" data-logo_alignment="left"></div>
    </div>
  </div>

  <div id="user-profile" class="user-profile" style="display:none;"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('send')">📤 Send</button>
    <button class="tab" onclick="switchTab('receive')">📥 Receive</button>
  </div>

  <div class="section active" id="send-section">
    <div class="drop-btn" onclick="document.getElementById('file-input').click()">📁 Click or Drop Files</div>
    <input type="file" id="file-input" multiple style="display:none">
    <div id="file-items-container"></div>
    <button class="btn-primary" id="generate-code-btn" onclick="generateTransferCode()">Generate Code</button>
    <div class="status" id="send-status"></div>
  </div>

  <div class="section" id="receive-section">
    <input type="text" id="room-input" placeholder="5-Digit Code" maxlength="5" style="width:100%; padding:15px; border-radius:15px; border:none; margin-bottom:20px; text-align:center; font-size:1.5rem; letter-spacing:5px;">
    <button class="btn-primary" onclick="joinRoom()">📥 Connect</button>
    <div class="status" id="recv-status"></div>
  </div>
</div>

<script>
// PWA Logic
let deferredPrompt;
const installBanner = document.getElementById('install-banner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = 'block';
});

installBanner.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBanner.style.display = 'none';
    deferredPrompt = null;
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}

// Particles
const particlesContainer = document.getElementById('background-particles');
for (let i = 0; i < 30; i++) {
    const particle = document.createElement('span');
    particle.className = 'particle clay-pebble';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.animation = `floatUp ${15 + Math.random() * 10}s linear -${Math.random() * 20}s infinite`;
    particlesContainer.appendChild(particle);
}

// Google Login
const socket = io();
function handleGoogleLogin(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    document.getElementById('google-btn-container').style.display = 'none';
    const profile = document.getElementById('user-profile');
    profile.style.display = 'block';
    profile.innerHTML = `👤 Linked: <b>${payload.email}</b>`;
    socket.emit('google-login', payload.email);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab + '-section').classList.add('active');
  event.target.classList.add('active');
}
// (File handling logic remains same as previous version)
</script>
</body>
</html>
